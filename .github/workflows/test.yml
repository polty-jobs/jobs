name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      IG_ACCESS_TOKEN: dummy
      IG_BUSINESS_ACCOUNT_ID: dummy
      IG_HANDLE: polty.jobs
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          pip install -e '.[dev]'
          python -m playwright install --with-deps chromium

      - name: Ruff
        run: ruff check src tests

      - name: Pytest
        run: pytest -v
